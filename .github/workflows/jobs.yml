name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: black
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install black
        run: pip install "black==24.10.0"

      - name: Run black --check
        run: black --check --diff app tests

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # requirements.txt is a conda lockfile for osx-arm64 and isn't pip-installable,
      # so we install the minimum runtime + test deps explicitly here.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi>=0.110" \
            "pydantic>=2.6" \
            "httpx>=0.27" \
            "numpy>=1.26" \
            "pandas>=2.2" \
            "joblib>=1.3" \
            "lightgbm>=4.0" \
            "pyarrow>=15.0" \
            "mlflow>=2.11" \
            "uvicorn[standard]>=0.27" \
            "pytest>=8.0"

      - name: Run pytest
        # Runs every marker (unit, functional, integration, application).
        # Integration + application tests load the legacy on-disk model from
        # `app/models/` because the repo commits those artifacts; the MLflow
        # smoke test in `tests/test_integration.py` skips when
        # `MLFLOW_TRACKING_URI` is empty. To exercise the MLflow path on CI,
        # add an `MLFLOW_TRACKING_URI` repo secret — the env block below
        # already forwards it. `-rs` prints the skip reasons so the CI log
        # shows what ran and what didn't.
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_MODEL_NAME: ${{ secrets.MLFLOW_MODEL_NAME }}
          MLFLOW_MODEL_STAGE: ${{ secrets.MLFLOW_MODEL_STAGE }}
        run: pytest -q -rs
