name: CI

on:
  push:
    branches: [main, map-feature]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black pylint
          pip install -r requirements.txt

      - name: Run Black check
        run: black --check app/

      - name: Run Pylint
        run: pylint app/ --disable=C0114,C0115,C0116,R0913,R0914,W0718,C0301 --max-line-length=120
        continue-on-error: true
