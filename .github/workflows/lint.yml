name: lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: black --check
        run: black --check app

      - name: pylint
        run: pylint app --disable=E0401,C0415,W0611,W1514,C0114,C0115,C0116,C0301,C0302,R0903,R0913,R0914,R0917,W1203 --max-line-length=120
